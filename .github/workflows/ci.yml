name: CI

# Runs on pushes to main and on PRs (the workspace builds cleanly — adp#14).
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: tsc, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (yarn 4)
        run: corepack enable

      - name: Install
        run: yarn install --no-immutable

      - name: Typecheck
        run: yarn tsc

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
