name: CI

# Runs on PRs and manual dispatch (not push to main) until the plugins
# build cleanly in a Backstage workspace — see adp#14. Add a `push` trigger
# once green.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: tsc, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack (yarn 4)
        run: corepack enable

      - name: Install
        run: yarn install --no-immutable

      - name: Typecheck
        run: yarn tsc

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
